name: 每日新闻简报

on:
  schedule:
    # 北京时间每天早上 8:07（UTC 00:07）
    - cron: '7 0 * * *'
  # 允许手动触发（测试用）
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r "法学学习/daily-news/requirements.txt"

      - name: 运行新闻简报
        env:
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          AUTH_CODE: ${{ secrets.AUTH_CODE }}
          SMTP_SERVER: smtp-mail.outlook.com
          SMTP_PORT: "587"
        run: |
          cd "法学学习/daily-news"
          python daily_news.py
